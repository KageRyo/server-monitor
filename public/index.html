<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主機監測系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2.25' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='2' width='20' height='6' rx='1.5'/%3E%3Crect x='2' y='10' width='20' height='6' rx='1.5'/%3E%3Crect x='2' y='18' width='20' height='4' rx='1.5'/%3E%3Ccircle cx='6' cy='5' r='1' fill='%2310b981'/%3E%3Ccircle cx='6' cy='13' r='1' fill='%2310b981'/%3E%3C/svg%3E" type="image/svg+xml">

  <script>
    // Tailwind dark mode 設定（必須在 body 之前執行）
    tailwind.config = {
      darkMode: 'class'
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');

    :root {
      --font-sans: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-sans);
    }

    .monitor-card {
      transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .monitor-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
    }

    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 9999px;
      display: inline-block;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.9);
    }
    .dark .status-dot {
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.9);
    }

    .status-up { background-color: #10b981; }
    .status-down { background-color: #ef4444; }
    .status-unknown { background-color: #94a3b8; }

    .heartbeat {
      display: flex;
      gap: 2.5px;
      align-items: center;
      height: 18px;
    }
    .hb-dot {
      width: 5.5px;
      height: 14px;
      border-radius: 1px;
      transition: transform 0.1s ease;
    }
    .hb-dot.up { background-color: #10b981; }
    .hb-dot.down { background-color: #ef4444; }
    .hb-dot.pending { background-color: #cbd5e1; }
    .dark .hb-dot.pending { background-color: #475569; }

    .section-title {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      color: #64748b;
    }
    .dark .section-title {
      color: #64748b;
    }

    .ip-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12.5px;
    }

    .stat-value {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .modal {
      animation: modalEnter 0.2s ease-out;
    }
    @keyframes modalEnter {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .nav-link {
      transition: all 0.1s ease;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 dark:bg-slate-950 dark:text-slate-200">

  <!-- Top Navigation -->
  <nav class="bg-white border-b border-slate-200 dark:bg-slate-900 dark:border-slate-800 sticky top-0 z-50">

      <div class="flex items-center justify-between h-16">

            <i class="fa-solid fa-server text-lg"></i>
          </div>
          <div>
            <div class="font-semibold text-2xl tracking-tight text-slate-800 dark:text-white">主機監測系統</div>

        <!-- Actions -->
        <div class="flex items-center gap-x-2">
          <!-- Theme Toggle -->

                  class="w-9 h-9 flex items-center justify-center text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition-colors"

            <i class="fa-solid fa-sort"></i>

  <!-- Toast -->

    <span id="toast-text"></span>

  <script>
    // ==================== 設定 ====================
    const API_BASE = '/api';
    let currentMonitors = [];
    let currentModalId = null;
    let currentViewingMonitor = null;   // 用來記錄目前打開的詳細視窗是哪一台
    let refreshTimer = null;
    let currentFilter = 'all'; // 'all' | 'up' | 'down'
    let isReorderMode = false;

    // ==================== 主題切換（亮色 / 暗色） ====================
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      let shouldBeDark;

      if (saved === 'dark') {
        shouldBeDark = true;
      } else if (saved === 'light') {
        shouldBeDark = false;
      } else {
        // 第一次使用，遵循系統設定
        shouldBeDark = prefersDark;
      }

      if (shouldBeDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      // 如果使用者沒有手動選擇過，則跟隨系統變化
      if (!saved) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) {
            document.documentElement.classList.toggle('dark', e.matches);
          }
        });
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isNowDark = html.classList.toggle('dark');

      // 明確儲存使用者選擇
      localStorage.setItem('theme', isNowDark ? 'dark' : 'light');
    }

    // ==================== 工具函式 ====================
    function formatTimeAgo(iso) {
      if (!iso) return '未檢查';
      const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (sec < 8) return '剛剛';
      if (sec < 60) return `${sec} 秒前`;
      if (sec < 3600) return `${Math.floor(sec/60)} 分鐘前`;
      return new Date(iso).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
    }

    function formatDateTime(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    }

    function getUptime(m) {
      if (!m.totalChecks || m.totalChecks === 0) return 100;
      return Math.round((m.upChecks / m.totalChecks) * 1000) / 10;
    }

    function showToast(message, error = false) {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toast-text');
      text.textContent = message;
      toast.style.background = error ? '#450a0a' : '#1e2937';
      toast.style.display = 'flex';
      setTimeout(() => {
        toast.style.transition = 'all .18s';
        toast.style.opacity = '0';
        setTimeout(() => {
          toast.style.display = 'none';
          toast.style.opacity = '1';
          toast.style.transition = '';
        }, 160);
      }, 2300);
    }

    // ==================== 渲染全域統計（可點擊篩選） ====================
    function renderGlobalStats(stats) {
      const el = document.getElementById('global-stats');

      const isActive = (f) => currentFilter === f 
        ? 'ring-2 ring-emerald-500 dark:ring-emerald-400' 
        : 'hover:ring-1 hover:ring-slate-300 dark:hover:ring-slate-600';

      el.innerHTML = `
        <div onclick="setFilter('all')" 
             class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 cursor-pointer transition-all ${isActive('all')}">
          <div class="text-xs text-slate-400">總監測數</div>
          <div class="text-4xl font-semibold text-slate-800 dark:text-white mt-1 tabular-nums">${stats.total || 0}</div>
        </div>
        <div onclick="setFilter('up')" 
             class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 cursor-pointer transition-all ${isActive('up')}">
          <div class="text-xs text-emerald-600">目前上線</div>
          <div class="text-4xl font-semibold text-emerald-600 mt-1 tabular-nums">${stats.up || 0}</div>
        </div>
        <div onclick="setFilter('down')" 
             class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 cursor-pointer transition-all ${isActive('down')}">
          <div class="text-xs text-rose-600">目前離線</div>
          <div class="text-4xl font-semibold text-rose-600 mt-1 tabular-nums">${stats.down || 0}</div>
        </div>
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 col-span-2 sm:col-span-1">
          <div class="text-xs text-slate-400">平均可用率</div>
          <div class="text-4xl font-semibold text-slate-800 dark:text-white mt-1 tabular-nums">${(stats.avgUptime || 0).toFixed(1)}<span class="text-lg font-normal">%</span></div>
        </div>
      `;

      const last = document.getElementById('last-check-time');
      last.textContent = stats.lastGlobalCheck 
        ? `上次檢查：${formatTimeAgo(stats.lastGlobalCheck)}` 
        : '等待首次檢查...';
    }

    function setFilter(filter) {
      currentFilter = filter;
      if (window.lastStats) {
        renderGlobalStats(window.lastStats);
      }
      renderGroups(currentMonitors);
    }

    // ==================== 群組排序功能 ====================
    async function toggleReorderMode() {
      isReorderMode = !isReorderMode;

      const btn = document.getElementById('reorder-btn');
      if (isReorderMode) {
        btn.classList.add('bg-emerald-100', 'dark:bg-emerald-900/30', 'border-emerald-400');
        btn.classList.remove('border-slate-200', 'dark:border-slate-700');
      } else {
        btn.classList.remove('bg-emerald-100', 'dark:bg-emerald-900/30', 'border-emerald-400');
        btn.classList.add('border-slate-200', 'dark:border-slate-700');
        // 離開排序模式時儲存
        await saveGroupOrder();
      }

      renderGroups(currentMonitors);
    }

    async function saveGroupOrder() {
      try {
        const sections = document.querySelectorAll('#groups-container > div');
        const order = [];

        sections.forEach(section => {
          const key = section.dataset.internalGroup;
          if (key) order.push(key);
        });

        await fetch('/api/groups/order', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order })
        });

        showToast('群組順序已儲存');
      } catch (e) {
        showToast('儲存順序失敗', true);
      }
    }

    async function moveGroupByInternal(internalKey, direction) {
      const sections = Array.from(document.querySelectorAll('#groups-container > div'));
      const currentIndex = sections.findIndex(s => s.dataset.internalGroup === internalKey);

      if (currentIndex === -1) return;

      const targetIndex = currentIndex + direction;
      if (targetIndex < 0 || targetIndex >= sections.length) return;

      const parent = sections[0].parentNode;
      if (direction > 0) {
        parent.insertBefore(sections[targetIndex], sections[currentIndex]);
      } else {
        parent.insertBefore(sections[currentIndex], sections[targetIndex]);
      }

      await saveGroupOrder();
    }

    // ==================== 心跳圖 ====================
    function createHeartbeat(history) {
      const container = document.createElement('div');
      container.className = 'heartbeat';
      const recent = (history || []).slice(-30);

      if (recent.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'text-xs text-slate-400 px-1';
        empty.textContent = '尚無檢查紀錄';
        return empty;
      }

      recent.forEach(item => {
        const d = document.createElement('div');
        d.className = `hb-dot ${item.alive ? 'up' : 'down'}`;
        d.title = `${new Date(item.time).toLocaleTimeString('zh-TW')} · ${item.alive ? '上線' : '離線'}${item.rtt ? ' ' + item.rtt + 'ms' : ''}`;
        container.appendChild(d);
      });
      return container;
    }

    // ==================== 單一監測卡片 ====================
    function createMonitorCard(monitor) {
      const uptime = getUptime(monitor);
      const isUp = monitor.status === 'up';
      const isDown = monitor.status === 'down';

      const card = document.createElement('div');
      card.className = `monitor-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 cursor-pointer`;

      card.innerHTML = `
        <div class="flex items-start justify-between">
          <div class="min-w-0">
            <div class="font-semibold text-lg leading-tight text-slate-800 dark:text-white truncate">${monitor.name}</div>
            <div class="ip-text text-emerald-600 dark:text-emerald-400 mt-0.5">${monitor.ip}</div>
          </div>
          <div class="flex items-center gap-x-2">
            <span class="status-dot ${isUp ? 'status-up' : isDown ? 'status-down' : 'status-unknown'}"></span>
            <span class="text-sm font-semibold ${isUp ? 'text-emerald-600' : isDown ? 'text-rose-600' : 'text-slate-400'}">
              ${isUp ? '上線' : isDown ? '離線' : '未知'}
            </span>
          </div>
        </div>

        <div class="mt-4 flex items-end justify-between">
          <div>
            <span class="text-4xl font-semibold tabular-nums text-slate-800 dark:text-white">${monitor.responseTime ?? '—'}</span>
            <span class="text-xs text-slate-400 ml-1">ms</span>
          </div>
          <div class="text-right">
            <div class="text-xs text-slate-400">${monitor.lastCheck ? formatTimeAgo(monitor.lastCheck) : '未檢查'}</div>
            <div class="text-xs mt-0.5">
              可用率 <span class="font-semibold text-emerald-600">${uptime.toFixed(1)}%</span>
            </div>
          </div>
        </div>

        ${monitor.notes ? `
        <div class="mt-2 text-xs text-slate-500 dark:text-slate-400 italic truncate" title="${monitor.notes}">
          📍 ${monitor.notes}
        </div>` : ''}

        <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700">
          <div class="flex items-center justify-between text-xs text-slate-400 mb-1.5">
            <div>最近狀態</div>
            <div>${monitor.totalChecks || 0} 次</div>
          </div>
          <div class="hb-container"></div>
        </div>
      `;

      card.querySelector('.hb-container').appendChild(createHeartbeat(monitor.history));
      card.onclick = () => showDetailModal(monitor);
      return card;
    }

    function getFilteredMonitors(monitors) {
      if (currentFilter === 'up') {
        return monitors.filter(m => m.status === 'up');
      }
      if (currentFilter === 'down') {
        return monitors.filter(m => m.status === 'down');
      }
      return monitors; // all
    }

    // ==================== 渲染群組（完全動態支援自訂類別） ====================
    function renderGroups(monitors) {
      const container = document.getElementById('groups-container');
      container.innerHTML = '';

      const filtered = getFilteredMonitors(monitors);

      // 以 internal group 為 key 來分組，保留 display label
      const groupMap = new Map(); // internalGroup -> { label, items: [] }

      filtered.forEach(m => {
        const internal = m.group || 'server';
        const displayLabel = m.groupLabel || (internal === 'server' ? '伺服器' : internal);

        if (!groupMap.has(internal)) {
          groupMap.set(internal, { label: displayLabel, items: [] });
        }
        groupMap.get(internal).items.push(m);
      });

      // 取得目前要顯示的 internal groups，並依照 groupOrder 或預設排序
      let internalGroups = Array.from(groupMap.keys());

      // 如果有自訂 groupOrder，就優先使用它
      // 注意：這裡我們讓後端已經處理好排序，所以直接用出現順序即可
      // 為了簡單，我們在這裡維持 DOM 順序（由後端回傳的 monitors 順序決定）

      // 為了支援前端即時排序，我們還是需要手動排序 internalGroups
      // 暫時先維持簡單：如果不在 reorder 模式，就信任後端順序

      let hasAny = false;

      // 建立 section
      internalGroups.forEach(internal => {
        const info = groupMap.get(internal);
        const label = info.label;
        const items = info.items;

        if (!items || items.length === 0) return;
        hasAny = true;

        const section = document.createElement('div');
        section.dataset.internalGroup = internal;   // 重要：存 internal key

        let headerHTML = `
          <div class="flex items-center gap-x-2 mb-3 px-1">
            <span class="section-title">${label}</span>
            <span class="text-xs text-slate-400">(${items.length})</span>
        `;

        if (isReorderMode) {
          headerHTML += `
            <button onclick="moveGroupByInternal('${internal}', -1)" class="ml-2 text-slate-400 hover:text-emerald-600 px-1" title="上移">
              <i class="fa-solid fa-arrow-up"></i>
            </button>
            <button onclick="moveGroupByInternal('${internal}', 1)" class="text-slate-400 hover:text-emerald-600 px-1" title="下移">
              <i class="fa-solid fa-arrow-down"></i>
            </button>
          `;
        }

        headerHTML += `</div>`;

        section.innerHTML = `
          ${headerHTML}
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4" id="grid-${internal}"></div>
        `;

        const grid = section.querySelector(`#grid-${internal}`);
        items.forEach(m => grid.appendChild(createMonitorCard(m)));
        container.appendChild(section);
      });

      document.getElementById('empty-state').classList.toggle('hidden', hasAny);
    }

    // ==================== 重新整理 ====================
    async function refreshUI(silent = false) {
      try {
        const res = await fetch(`${API_BASE}/monitors`);
        const data = await res.json();
        currentMonitors = data.monitors || [];
        window.lastStats = data.stats || {};
        renderGlobalStats(window.lastStats);
        renderGroups(currentMonitors);
      } catch (e) {
        if (!silent) showToast('無法取得最新狀態', true);
      }
    }

    // ==================== Modal ====================
    function showDetailModal(monitor) {
      currentModalId = monitor.id;
      currentViewingMonitor = monitor;

      document.getElementById('modal-name').textContent = monitor.name;
      document.getElementById('modal-ip').textContent = monitor.ip;

      const badge = document.getElementById('modal-status-badge');
      const isUp = monitor.status === 'up';
      badge.innerHTML = `
        <span class="inline-flex items-center gap-x-2 px-3 py-1 rounded-2xl text-sm font-semibold 
          ${isUp ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' : 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-400'}">
          <i class="fa-solid ${isUp ? 'fa-check' : 'fa-times'}"></i>
          ${isUp ? '上線中' : '已離線'}
        </span>`;

      document.getElementById('modal-rtt').innerHTML = monitor.responseTime != null 
        ? `${monitor.responseTime}<span class="text-base font-normal text-slate-400">ms</span>` : '—';
      
      document.getElementById('modal-uptime').textContent = getUptime(monitor).toFixed(1) + '%';
      document.getElementById('modal-last').textContent = formatDateTime(monitor.lastCheck);

      // Notes
      const notesEl = document.getElementById('modal-notes');
      if (monitor.notes && monitor.notes.trim()) {
        notesEl.textContent = '📍 ' + monitor.notes;
        notesEl.classList.remove('hidden');
      } else {
        notesEl.classList.add('hidden');
      }

      const hb = document.getElementById('modal-heartbeat');
      hb.innerHTML = '';
      hb.appendChild(createHeartbeat(monitor.history));

      document.getElementById('modal-history-count').textContent = `共 ${(monitor.history || []).length} 筆紀錄`;

      document.getElementById('detail-modal').classList.remove('hidden');
      document.getElementById('detail-modal').classList.add('flex');
    }

    function hideDetailModal() {
      const m = document.getElementById('detail-modal');
      m.classList.remove('flex');
      m.classList.add('hidden');
      currentModalId = null;
      currentViewingMonitor = null;
    }

    function editFromModal() {
      // 優先使用我們記住的目前查看中的主機，避免 ID 查找問題
      const monitorToEdit = currentViewingMonitor;
      hideDetailModal();

      if (monitorToEdit) {
        showEditModal(monitorToEdit);
      } else if (currentModalId) {
        // 備援方案
        const mon = currentMonitors.find(m => m.id === currentModalId);
        if (mon) showEditModal(mon);
      }
    }

    async function checkSingleFromModal() {
      if (!currentModalId) return;
      try {
        const res = await fetch(`${API_BASE}/monitors/${currentModalId}/check`, { method: 'POST' });
        const updated = await res.json();
        showToast('檢查完成');
        const idx = currentMonitors.findIndex(m => m.id === currentModalId);
        if (idx > -1) currentMonitors[idx] = updated;
        hideDetailModal();
        await refreshUI(true);
        const fresh = currentMonitors.find(m => m.id === currentModalId);
        if (fresh) showDetailModal(fresh);
      } catch {
        showToast('檢查失敗', true);
      }
    }

    async function deleteFromModal() {
      if (!currentModalId || !confirm('確定要刪除此監測項目嗎？')) return;
      await fetch(`${API_BASE}/monitors/${currentModalId}`, { method: 'DELETE' });
      showToast('已刪除');
      hideDetailModal();
      await refreshUI(true);
    }

    // ==================== 新增/編輯 ====================
    let editingId = null;

    function showAddModal() {
      editingId = null;
      document.getElementById('form-title').textContent = '新增監測主機';
      document.getElementById('form-submit-btn').textContent = '新增主機';
      document.getElementById('form-ip').value = '';
      document.getElementById('form-ip').disabled = false;
      document.getElementById('form-name').value = '';
      document.getElementById('form-group').value = '伺服器';
      document.getElementById('form-notes').value = '';

      populateGroupSuggestions();

      document.getElementById('form-modal').classList.remove('hidden');
      document.getElementById('form-modal').classList.add('flex');
    }

    function showEditModal(monitor) {
      editingId = monitor.id;
      document.getElementById('form-title').textContent = '編輯監測主機';
      document.getElementById('form-submit-btn').textContent = '儲存變更';
      document.getElementById('form-ip').value = monitor.ip;
      document.getElementById('form-ip').disabled = true;
      document.getElementById('form-name').value = monitor.name || '';
      document.getElementById('form-group').value = monitor.groupLabel || monitor.group || '伺服器';
      document.getElementById('form-notes').value = monitor.notes || '';

      populateGroupSuggestions();

      document.getElementById('form-modal').classList.remove('hidden');
      document.getElementById('form-modal').classList.add('flex');
    }

    function hideFormModal() {
      const m = document.getElementById('form-modal');
      m.classList.remove('flex');
      m.classList.add('hidden');
      editingId = null;
    }

    function getExistingGroups() {
      const seen = new Set();
      const groups = [];

      currentMonitors.forEach(m => {
        const label = (m.groupLabel || m.group || '').trim();
        if (label && !seen.has(label)) {
          seen.add(label);
          groups.push(label);
        }
      });

      if (!seen.has('伺服器')) groups.unshift('伺服器');
      return groups;
    }

    function populateGroupSuggestions() {
      const panel = document.getElementById('group-suggestions');
      if (!panel) return;

      panel.innerHTML = '';
      const groups = getExistingGroups();

      if (groups.length === 0) {
        panel.innerHTML = '<div class="text-xs text-slate-400 px-1 py-1">目前沒有既有類別</div>';
        return;
      }

      groups.forEach(label => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'px-3 py-1.5 rounded-2xl text-sm border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 hover:border-emerald-400 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors';
        btn.textContent = label;
        btn.addEventListener('click', () => {
          document.getElementById('form-group').value = label;
        });
        panel.appendChild(btn);
      });
    }

    async function submitFormModal() {
      const ip = document.getElementById('form-ip').value.trim();
      const name = document.getElementById('form-name').value.trim();
      let group = document.getElementById('form-group').value.trim();
      const notes = document.getElementById('form-notes').value.trim();

      if (!group) group = '伺服器';

      if (!editingId && !ip) { showToast('請輸入 IP', true); return; }

      const payload = { ip, name: name || ip, group, notes };

      try {
        const url = editingId ? `${API_BASE}/monitors/${editingId}` : `${API_BASE}/monitors`;
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(editingId ? { name: payload.name, group, notes: payload.notes } : payload)
        });
        if (!res.ok) throw new Error((await res.json()).error || '失敗');
        hideFormModal();
        showToast(editingId ? '已更新' : '新增成功');
        await refreshUI(true);
      } catch (e) {
        showToast(e.message || '操作失敗', true);
      }
    }

    // ==================== 全部檢查 ====================
    async function checkAllNow() {
      try {
        const res = await fetch(`${API_BASE}/check-all`, { method: 'POST' });
        if (res.status === 429) { showToast('檢查中，請稍候', true); return; }
        await res.json();
        showToast('已完成全部檢查');
        await refreshUI(true);
      } catch {
        showToast('檢查失敗', true);
      }
    }

    // ==================== 初始化 ====================
    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => refreshUI(true), 8000);
    }

    async function init() {
      initTheme();
      await refreshUI(true);
      startAutoRefresh();

      // 鍵盤快捷鍵
      document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement.tagName === 'BODY') { e.preventDefault(); showAddModal(); }
        if ((e.key.toLowerCase() === 'r') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); refreshUI(); }
      });

      console.log('%c[Monitor] Clean custom design loaded', 'color:#64748b');
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
